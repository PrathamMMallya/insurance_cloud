# Not done yet
version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15.4-alpine
    container_name: medical-app-db
    environment:
      POSTGRES_DB: ${RDS_DB_NAME:-medicalapp}
      POSTGRES_USER: ${RDS_DB_USER:-admin}
      POSTGRES_PASSWORD: ${RDS_DB_PASSWORD:-ChangeMe123!}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RDS_DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical-network
    restart: unless-stopped

  # Redis Cache (Optional)
  redis:
    image: redis:7.2-alpine
    container_name: medical-app-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical-network
    restart: unless-stopped

  # Django Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-app
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: core.settings
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgresql://${RDS_DB_USER:-admin}:${RDS_DB_PASSWORD:-ChangeMe123!}@db:5432/${RDS_DB_NAME:-medicalapp}
      REDIS_URL: redis://redis:6379/0
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
      - logs_volume:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medical-network
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: medical-app-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
      - ./ssl:/etc/nginx/ssl:ro  # For SSL certificates
    depends_on:
      - app
    networks:
      - medical-network
    restart: unless-stopped

  # Celery Worker (Optional, for async tasks)
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-app-celery
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: core.settings
      DATABASE_URL: postgresql://${RDS_DB_USER:-admin}:${RDS_DB_PASSWORD:-ChangeMe123!}@db:5432/${RDS_DB_NAME:-medicalapp}
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - .:/app
      - logs_volume:/app/logs
    depends_on:
      - db
      - redis
      - app
    networks:
      - medical-network
    restart: unless-stopped
    command: celery -A core worker -l info

  # Flower (Celery Monitoring - Optional)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-app-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - celery
      - redis
    networks:
      - medical-network
    restart: unless-stopped
    command: celery -A core flower --port=5555

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

networks:
  medical-network:
    driver: bridge
